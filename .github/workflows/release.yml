name: CD - Release and Publish

on:
  push:
    branches: [main, master]

jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version in pyproject.toml changed
        id: check
        run: |
          # Get current version
          VERSION=$(grep -m 1 "version =" pyproject.toml | tr -d '"' | tr -d ' ' | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Compare with previous commit
          PREV_VERSION=$(git show HEAD~1:pyproject.toml | grep -m 1 "version =" | tr -d '"' | tr -d ' ' | cut -d'=' -f2 || echo "0.0.0")

          if [ "$VERSION" != "$PREV_VERSION" ]; then
            echo "Version changed from $PREV_VERSION to $VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION has not changed"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish to PyPI and GitHub
    needs: [check-version]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          body: |
            ## Automated Release v${{ needs.check-version.outputs.version }}

            This release was automatically generated based on a version change in `pyproject.toml`.

            ### Changes
            Check the commit log for details.
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
